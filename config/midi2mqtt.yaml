# midi2mqtt configuration — Traktor Kontrol F1
# Upstream project: https://github.com/bzeiss/midi2mqtt
#
# IMPORTANT: Do NOT commit passwords or credentials. See .gitignore.
#
# NOTE ON PLATFORM:
# This config is for LINUX running the F1 in standard (Traktor) mode.
#
# For macOS, the F1 must be in MIDI Mode (Shift+Browse on the F1).
# Use config/midi2mqtt-macos-midi-mode.yaml instead, which includes the
# correct port name and CC event mappings for macOS MIDI mode.
# See README section "F1 MIDI Mode (macOS)" for more details.
#
# Linux MIDI port name: "Traktor Kontrol F1 MIDI 1" (class-compliant, no driver needed)
# Confirm on your system with: midi2mqtt -list-ports

mqtt_server:
  broker:
    host: "192.168.1.x"    # <-- CHANGE THIS to your MQTT broker / HA host IP
    port: 1883
    protocol: "mqtt"       # mqtt | mqtts | ws | wss

  client:
    client_id: "midi2mqtt_traktor_f1"
    clean_session: true
    keepalive: 60

  auth:
    username: ""
    password: ""           # <-- fill in if your broker requires auth; NEVER commit real credentials

  connection:
    retry_interval: 10
    max_retries: 3
    timeout: 30

mqtt_publications:
  - type: custom_json
    enabled: true
    topic: "midi/events"
    qos: 1
    retain: false
  - type: home_assistant
    enabled: true
    topic: "homeassistant/sensor/traktor_f1"
    qos: 1
    retain: false
    unique_id: "traktor_f1"
    device:
      identifiers: ["traktor_f1"]
      name: "Traktor F1"
      manufacturer: "Native Instruments"

midi:
  # Standard class-compliant USB MIDI port name on Linux.
  # Run `midi2mqtt -list-ports` to confirm the exact name on your system.
  port: "Traktor Kontrol F1 MIDI 1"

  event_types:
    - note_on
    - note_off
    - cc:0    # Fader 1
    - cc:1    # Fader 2
    - cc:2    # Fader 3
    - cc:3    # Fader 4

log_level: "INFO"
