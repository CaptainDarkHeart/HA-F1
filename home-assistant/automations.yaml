- id: '1772719232604'
  alias: F1 Bottom-left pad — Toggle desk lights
  description: F1 Bottom-left pad (CC 22) — Toggle desk lights
  triggers:
  - topic: midi/events
    trigger: mqtt
  conditions:
  - condition: template
    value_template: '{{ trigger.payload_json.controller == 22 and trigger.payload_json.value == 127 }}'
  actions:
  - target:
      entity_id: light.dan_desk_lights
    action: light.toggle
  mode: single

- id: '1772719313029'
  alias: F1 Fader 1 — Control desk lights brightness
  description: F1 Fader 1 (CC 6) — Control desk lights brightness
  triggers:
  - topic: midi/events
    trigger: mqtt
  conditions:
  - condition: template
    value_template: '{{ trigger.payload_json.controller == 6 }}'
  actions:
  - target:
      entity_id: light.dan_desk_lights
    data:
      brightness: '{{ ((trigger.payload_json.value | int) / 127 * 255) | int }}'
    action: light.turn_on
  mode: single

